app = "shipcheck"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health/live"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health/ready"
    timeout = "10s"

[[vm]]
  memory = "4096mb"
  cpus = 2

[deploy]
  release_command = "node /app/apps/api/dist/migrate-cli.js"
