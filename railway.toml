# https://docs.railway.com/config-as-code/reference
# https://docs.railway.com/builds/dockerfiles
# https://docs.railway.com/deployments/pre-deploy-command

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs in a separate container from the built image (same env vars; no volumes).
# WORKDIR is /app/apps/api — see Dockerfile.
preDeployCommand = ["node dist/migrate-cli.js"]
# Must listen on $PORT before heavy boot; do not use dist/server.js here.
startCommand = "node dist/entry.js"
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
